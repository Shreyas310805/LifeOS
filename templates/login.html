<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - LifeOS</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f7f6;
      }
      .login-container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .google-btn {
        background-color: #4285f4;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
        transition: background-color 0.3s;
      }
      .google-btn:hover {
        background-color: #357ae8;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>Welcome to LifeOS</h1>
      <p>Track your fitness and compete with friends.</p>

      <button id="google-signin-btn" class="google-btn">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Sign in with Google
      </button>
      <p
        id="status-message"
        style="color: #666; font-size: 14px; margin-top: 15px; display: none">
        Logging you in...
      </p>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      // 👇 YOU MUST REPLACE THIS WITH YOUR FIREBASE WEB CONFIG 👇
      // Go to Firebase Console -> Project Settings -> General -> Web App
      const firebaseConfig = {
        apiKey: "AIzaSyD4R8pNUQAxokDUXIqNdXMlvM52D0Du-Zk",
        authDomain: "lifeos-db76d.firebaseapp.com",
        projectId: "lifeos-db76d",
        storageBucket: "lifeos-db76d.firebasestorage.app",
        messagingSenderId: "431290313107",
        appId: "1:431290313107:web:4b3b4a5c0fc56677cbe066",
        measurementId: "G-9BCK6429FB",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      const loginBtn = document.getElementById("google-signin-btn");
      const statusMsg = document.getElementById("status-message");

      loginBtn.addEventListener("click", () => {
        statusMsg.style.display = "block";
        statusMsg.innerText = "Waiting for Google...";

        signInWithPopup(auth, provider)
          .then((result) => {
            statusMsg.innerText = "Securely authenticating with LifeOS...";
            // Get the secure token from Firebase
            return result.user.getIdToken();
          })
          .then((idToken) => {
            // Send the token to your Flask backend
            return fetch("/api/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ idToken: idToken }),
            });
          })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              statusMsg.innerText = "Success! Redirecting...";
              window.location.href = "/"; // Send them to the dashboard
            } else {
              statusMsg.innerText = "Login failed. Try again.";
              alert("Backend Error: " + data.message);
            }
          })
          .catch((error) => {
            console.error("Auth error:", error);
            statusMsg.innerText = "";
            alert("Authentication failed: " + error.message);
          });
      });
    </script>
  </body>
</html>
